<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary meta -->
    <title>Litigant AI — Don't just ask AI. Put the question on trial.</title>
    <meta name="description" content="Litigant AI pits multiple AI models against each other in structured debate to expose blind spots, challenge assumptions, and deliver adversarial clarity on any question." />
    <link rel="canonical" href="https://litigant-ai.com/" />

    <!-- Indexing — max-snippet lets AI overviews show full context -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Litigant AI" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://litigant-ai.com/" />
    <meta property="og:title" content="Litigant AI — Don't just ask AI. Put the question on trial." />
    <meta property="og:description" content="Multiple AI models debate, cross-examine, and deliver a confidence-scored verdict on your toughest questions. Business plans, contracts, code, decisions, and more." />
    <meta property="og:image" content="https://litigant-ai.com/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@litigantai" />
    <meta name="twitter:title" content="Litigant AI — Don't just ask AI. Put the question on trial." />
    <meta name="twitter:description" content="Multiple AI models debate your question, expose blind spots, and deliver a confidence-scored verdict." />
    <meta name="twitter:image" content="https://litigant-ai.com/opengraph.jpg" />

    <!-- AI crawler hints -->
    <meta name="ai-content-declaration" content="This site uses AI-generated analysis as a tool. All outputs include confidence scores and explicit caveats. Not legal, financial, or medical advice." />
    <link rel="ai-description" href="/llms.txt" type="text/plain" />

    <!-- Structured data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Litigant AI",
      "url": "https://litigant-ai.com",
      "description": "Multi-model adversarial reasoning engine. Multiple AI models debate your question from competing perspectives and deliver a confidence-scored verdict.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "USD",
          "description": "50 credits on signup, ~3 sessions, 2 AI models"
        },
        {
          "@type": "Offer",
          "name": "Starter",
          "price": "19",
          "priceCurrency": "USD",
          "description": "500 credits/month, 4 AI models, unlimited sessions"
        },
        {
          "@type": "Offer",
          "name": "Pro",
          "price": "49",
          "priceCurrency": "USD",
          "description": "2,000 credits/month, all AI models, priority processing"
        }
      ],
      "featureList": [
        "Multi-model adversarial debate",
        "Confidence-scored verdicts",
        "GPT-4, Claude, Gemini, and Grok",
        "Business plan analysis",
        "Contract review preparation",
        "Code and architecture audit",
        "Decision analysis with second-order effects",
        "Research synthesis",
        "PDF and Markdown export",
        "Session history"
      ]
    }
    </script>

    <!-- Structured data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Litigant AI",
      "url": "https://litigant-ai.com",
      "description": "Free AI analysis tools for business, legal, technical, and personal decisions",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://litigant-ai.com/tools?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Litigant AI",
      "url": "https://litigant-ai.com",
      "logo": "https://litigant-ai.com/favicon.svg",
      "description": "Adversarial AI reasoning engine — multiple AI models debate your toughest questions."
    }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
