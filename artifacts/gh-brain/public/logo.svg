<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Brain: two-pass cloud technique.
       Pass 1 draws slightly enlarged green circles to create the border ring.
       Pass 2 draws normal-size black circles to fill the interior,
       leaving only the outer green rim visible. -->

  <!-- Pass 1: green expanded circles (border) -->
  <circle cx="33" cy="28" r="21.5" fill="#4ade80"/>
  <circle cx="67" cy="28" r="21.5" fill="#4ade80"/>
  <circle cx="12" cy="52" r="17"   fill="#4ade80"/>
  <circle cx="88" cy="52" r="17"   fill="#4ade80"/>
  <circle cx="30" cy="74" r="17.5" fill="#4ade80"/>
  <circle cx="70" cy="74" r="17.5" fill="#4ade80"/>
  <circle cx="50" cy="83" r="15.5" fill="#4ade80"/>

  <!-- Pass 2: black fills cover the interior, leaving the green rim -->
  <circle cx="33" cy="28" r="18"   fill="#000"/>
  <circle cx="67" cy="28" r="18"   fill="#000"/>
  <circle cx="12" cy="52" r="13.5" fill="#000"/>
  <circle cx="88" cy="52" r="13.5" fill="#000"/>
  <circle cx="30" cy="74" r="14"   fill="#000"/>
  <circle cx="70" cy="74" r="14"   fill="#000"/>
  <circle cx="50" cy="83" r="12"   fill="#000"/>

  <!-- Top-center notch cutter (creates the hemisphere divide at the top) -->
  <ellipse cx="50" cy="11" rx="9" ry="10" fill="#000"/>

  <!-- Green longitudinal fissure (center divide) -->
  <line x1="50" y1="21" x2="50" y2="90"
        stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Amber scales: horizontal beam -->
  <line x1="26" y1="55" x2="74" y2="55"
        stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Amber scales: left pan hangers -->
  <line x1="26" y1="55" x2="18" y2="71"
        stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="55" x2="34" y2="71"
        stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <!-- Left pan arc -->
  <path d="M 16 71 Q 26 79 36 71"
        stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Amber scales: right pan hangers -->
  <line x1="74" y1="55" x2="66" y2="71"
        stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="74" y1="55" x2="82" y2="71"
        stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <!-- Right pan arc -->
  <path d="M 64 71 Q 74 79 84 71"
        stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>
