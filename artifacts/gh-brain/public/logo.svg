<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Brain outline — green stroke, transparent interior -->
  <!-- Right hemisphere -->
  <path
    d="M50 21
       C57 14, 70 12, 77 18
       C85 24, 89 34, 87 43
       C91 50, 89 57, 85 62
       C89 68, 87 76, 81 79
       C74 83, 62 81, 52 76
       L50 74"
    stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
  />
  <!-- Left hemisphere -->
  <path
    d="M50 21
       C43 14, 30 12, 23 18
       C15 24, 11 34, 13 43
       C9 50, 11 57, 15 62
       C11 68, 13 76, 19 79
       C26 83, 38 81, 48 76
       L50 74"
    stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
  />

  <!-- Gyri details — right side -->
  <path d="M77 20 C83 24 87 30 86 36" stroke="#22c55e" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M86 44 C89 50 88 57 85 62" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M84 63 C88 69 86 76 81 79" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- Gyri details — left side -->
  <path d="M23 20 C17 24 13 30 14 36" stroke="#22c55e" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M14 44 C11 50 12 57 15 62" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M16 63 C12 69 14 76 19 79" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- Longitudinal fissure (center divide, dashed) -->
  <path d="M50 21 C49 36 49 56 50 74" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3 2.5" stroke-linecap="round" fill="none"/>

  <!-- ── Scales of Justice — amber ── -->

  <!-- Vertical post -->
  <line x1="50" y1="36" x2="50" y2="69" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Pivot knob at top -->
  <circle cx="50" cy="35" r="2.8" fill="#f59e0b"/>

  <!-- Horizontal beam -->
  <line x1="31" y1="44" x2="69" y2="44" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Left suspension cords -->
  <line x1="31" y1="44" x2="27" y2="57" stroke="#f59e0b" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="31" y1="44" x2="35" y2="57" stroke="#f59e0b" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Left pan (arc) -->
  <path d="M25 57 Q31 63 37 57" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Right suspension cords -->
  <line x1="69" y1="44" x2="65" y2="57" stroke="#f59e0b" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="69" y1="44" x2="73" y2="57" stroke="#f59e0b" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Right pan (arc) -->
  <path d="M63 57 Q69 63 75 57" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Base platform -->
  <line x1="43" y1="69" x2="57" y2="69" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
</svg>
