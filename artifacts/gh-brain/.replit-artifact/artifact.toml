kind = "web"
previewPath = "/"
title = "GH Brain"
version = "1.0.0"
id = "artifacts/gh-brain"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18396

[services.development]
run = "pnpm --filter @workspace/gh-brain run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gh-brain", "run", "build" ]
publicDir = "artifacts/gh-brain/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18396"
BASE_PATH = "/"
